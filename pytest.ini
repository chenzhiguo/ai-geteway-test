[pytest]
testpaths = e2e performance
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    e2e: E2E测试
    performance: 性能测试
    smoke: 冒烟测试
    regression: 回归测试
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
timeout = 300